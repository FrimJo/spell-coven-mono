name: Web SBOM

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: web-sbom
  cancel-in-progress: true

jobs:
  generate:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SCAN_ROOT: ${{ runner.temp }}/web-sbom-root
      SBOM_FILE: ${{ runner.temp }}/web-sbom.cyclonedx.json
      SYFT_DEFAULT_CATALOGERS: javascript-package-cataloger
      SYFT_SOURCE_NAME: '@repo/web'
      SYFT_SOURCE_VERSION: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Prepare isolated web workspace
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$SCAN_ROOT/apps/web" "$SCAN_ROOT/packages"
          cp package.json bun.lock "$SCAN_ROOT/"
          cp apps/web/package.json "$SCAN_ROOT/apps/web/package.json"

          while IFS= read -r manifest; do
            destination="$SCAN_ROOT/$(dirname "$manifest")"
            mkdir -p "$destination"
            cp "$manifest" "$destination/package.json"
          done < <(find packages -mindepth 2 -maxdepth 2 -name package.json \
            ! -path 'packages/mtg-image-db/package.json' -print | sort)

          sha256sum bun.lock | cut -d ' ' -f 1 > "$RUNNER_TEMP/source-bun-lock.sha256"

      - name: Install resolved web dependencies
        working-directory: ${{ runner.temp }}/web-sbom-root
        run: bun install --frozen-lockfile --filter @repo/web --linker isolated

      - name: Finalize scan root
        shell: bash
        run: |
          set -euo pipefail

          sha256sum -c <(printf '%s  bun.lock\n' "$(cat "$RUNNER_TEMP/source-bun-lock.sha256")")
          sha256sum -c <(printf '%s  %s/bun.lock\n' "$(cat "$RUNNER_TEMP/source-bun-lock.sha256")" "$SCAN_ROOT")

          cp "$SCAN_ROOT/apps/web/package.json" "$SCAN_ROOT/package.json"
          rm "$SCAN_ROOT/bun.lock"

      - name: Generate and submit SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ runner.temp }}/web-sbom-root
          format: cyclonedx-json
          output-file: ${{ runner.temp }}/web-sbom.cyclonedx.json
          artifact-name: web-sbom.cyclonedx.json
          syft-version: v1.44.0
          upload-artifact: true
          upload-artifact-retention: 30
          upload-release-assets: false
          dependency-snapshot: true

      - name: Validate SBOM
        shell: bash
        run: |
          set -euo pipefail

          jq -e '
            .bomFormat == "CycloneDX" and
            (.specVersion | test("^1\\.[0-9]+$")) and
            (.metadata.component.name == "@repo/web") and
            (.metadata.component.version == env.GITHUB_SHA) and
            any(
              .components[];
              .version != null and
              .version != "UNKNOWN" and
              any(
                (.properties // [])[];
                .name == "syft:location:0:path" and
                (.value | contains("/node_modules/.bun/"))
              )
            )
          ' "$SBOM_FILE" > /dev/null
